<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basketball Scoreboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="scoreboard">
        <div class="teams">
            <!-- HOME -->
            <div class="team">
                <span class="team-name">HOME</span>
                <div class="score-display" onclick="editScore('home')">
                    <span class="score" id="home-score">0</span>
                    <input class="score-input hidden" id="home-input" type="number" min="0"
                        onblur="saveScore('home')"
                        onkeydown="if(event.key==='Enter') saveScore('home')">
                </div>
                <div class="buttons">
                    <button class="btn" onclick="addScore('home', 1)">+1</button>
                    <button class="btn" onclick="addScore('home', 2)">+2</button>
                    <button class="btn" onclick="addScore('home', 3)">+3</button>
                </div>
            </div>

            <!-- GUEST -->
            <div class="team">
                <span class="team-name">GUEST</span>
                <div class="score-display" onclick="editScore('guest')">
                    <span class="score" id="guest-score">0</span>
                    <input class="score-input hidden" id="guest-input" type="number" min="0"
                        onblur="saveScore('guest')"
                        onkeydown="if(event.key==='Enter') saveScore('guest')">
                </div>
                <div class="buttons">
                    <button class="btn" onclick="addScore('guest', 1)">+1</button>
                    <button class="btn" onclick="addScore('guest', 2)">+2</button>
                    <button class="btn" onclick="addScore('guest', 3)">+3</button>
                </div>
            </div>
        </div>

        <button class="btn reset-btn" onclick="resetScores()">RESET</button>
    </div>

    <script src="index.js"></script>
</body>
</html>
